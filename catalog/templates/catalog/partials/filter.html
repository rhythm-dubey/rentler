<form method="get" class="space-y-md rounded-xl border border-outline-variant bg-surface p-lg">
  <h2 class="text-title-lg font-title-lg text-on-surface">Filters</h2>
  <div>
    <label class="block text-label-md text-on-surface-variant mb-xs" for="id_q">Keywords</label>
    <input type="text" name="q" id="id_q" value="{{ form.q.value|default:'' }}" class="w-full rounded-lg border border-outline-variant bg-surface-container-low px-md py-sm text-body-sm">
  </div>
  <div>
    <label class="block text-label-md text-on-surface-variant mb-xs" for="id_category">Category</label>
    <select name="category" id="id_category" class="w-full rounded-lg border border-outline-variant bg-surface-container-low px-md py-sm text-body-sm">
      <option value="">All categories</option>
      {% for cat in categories %}
        <option value="{{ cat.slug }}" {% if form.category.value == cat.slug %}selected{% endif %}>{{ cat.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-label-md text-on-surface-variant mb-xs" for="id_city">City</label>
    <input type="text" name="city" id="id_city" value="{{ form.city.value|default:'' }}" class="w-full rounded-lg border border-outline-variant bg-surface-container-low px-md py-sm text-body-sm">
  </div>
  <div>
    <label class="block text-label-md text-on-surface-variant mb-xs" for="id_state">State</label>
    <input type="text" name="state" id="id_state" value="{{ form.state.value|default:'' }}" class="w-full rounded-lg border border-outline-variant bg-surface-container-low px-md py-sm text-body-sm">
  </div>
  <div>
    <label class="block text-label-md text-on-surface-variant mb-xs" for="id_post_code">Post code</label>
    <input type="text" name="post_code" id="id_post_code" value="{{ form.post_code.value|default:'' }}" class="w-full rounded-lg border border-outline-variant bg-surface-container-low px-md py-sm text-body-sm">
  </div>
  <div class="space-y-xs">
    <label class="flex items-center gap-sm text-body-sm"><input type="checkbox" name="delivery" value="1" {% if form.delivery.value %}checked{% endif %}> Owner delivery</label>
    <label class="flex items-center gap-sm text-body-sm"><input type="checkbox" name="pickup" value="1" {% if form.pickup.value %}checked{% endif %}> Pickup</label>
    <label class="flex items-center gap-sm text-body-sm"><input type="checkbox" name="postage" value="1" {% if form.postage.value %}checked{% endif %}> Postage</label>
  </div>
  <button type="submit" class="w-full bg-primary text-on-primary font-label-md text-label-md py-sm rounded-lg hover:shadow-lg transition-all">Apply</button>
</form>
