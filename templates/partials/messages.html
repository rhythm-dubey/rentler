{% if messages %}
<ul class="fixed top-20 right-4 z-[60] space-y-sm max-w-sm w-full pointer-events-none">
  {% for message in messages %}
  <li class="pointer-events-auto rounded-lg border border-outline-variant bg-surface-container-lowest px-md py-sm soft-ambient-shadow text-body-sm text-on-surface {% if message.tags == 'error' %}border-error text-error{% elif message.tags == 'success' %}border-secondary text-secondary{% endif %}">
    {{ message }}
  </li>
  {% endfor %}
</ul>
{% endif %}
