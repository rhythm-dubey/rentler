{% extends "accounts/base.html" %}
{% block page_title %}Password reset{% endblock %}
{% block content %}
<h1 class="font-headline-md text-headline-md text-on-surface mb-sm">Password reset</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-lg">Enter your email and we will send reset instructions.</p>
<form method="post" class="space-y-lg">
  {% csrf_token %}
  {{ form.non_field_errors }}
  {% for field in form %}
    <div class="space-y-xs">
      <label class="font-label-sm text-label-sm text-on-surface-variant uppercase" for="{{ field.id_for_label }}">{{ field.label }}</label>
      <input class="w-full h-10 px-md rounded-lg border border-outline-variant bg-surface-container-low text-body-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none" type="{{ field.field.widget.input_type|default:'text' }}" name="{{ field.name }}" id="{{ field.id_for_label }}" value="{{ field.value|default:'' }}" required>
      {{ field.errors }}
    </div>
  {% endfor %}
  <button type="submit" class="w-full h-12 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-primary-container transition-all">Send reset link</button>
</form>
{% endblock %}
